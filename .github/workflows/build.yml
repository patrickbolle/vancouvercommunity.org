name: Build Site

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - '_includes/**'
      - '_data/**'
      - 'src/**'
      - 'static/**'
      - 'eleventy.config.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx @11ty/eleventy
