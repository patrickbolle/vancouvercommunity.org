<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px;
    height: 800px;
    overflow: hidden;
  }

  .og-card {
    width: 800px;
    height: 800px;
    background: #FAF8F5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 70px 70px;
    position: relative;
    overflow: hidden;
  }

  .og-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 8px;
    background: #A85A46;
  }

  .og-card::after {
    content: '';
    position: absolute;
    right: -40px;
    bottom: -40px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: rgba(168, 90, 70, 0.05);
  }

  .og-emoji {
    font-size: 44px;
    margin-bottom: 24px;
  }

  .og-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 52px;
    color: #2C2925;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .og-description {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    color: #524D48;
    line-height: 1.5;
    max-width: 640px;
    margin-bottom: 40px;
  }

  .og-footer {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: auto;
  }

  .og-url {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: #A85A46;
    letter-spacing: 0.02em;
  }

  .og-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: #706B65;
    background: rgba(168, 90, 70, 0.08);
    padding: 6px 14px;
    border-radius: 20px;
  }
</style>
</head>
<body>
  <div class="og-card">
    <div class="og-emoji">🏔️ 🍁</div>
    <h1 class="og-title">Vancouver<br>Community Directory</h1>
    <p class="og-description">A community-built directory of 260+ groups, clubs, meetups, and social events in Vancouver, BC.</p>
    <div class="og-footer">
      <span class="og-url">vancouvercommunity.org</span>
      <span class="og-badge">Find your people</span>
    </div>
  </div>
</body>
</html>
